<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook - Iniciar sesión</title>

<style>
:root {
    --bg: #f0f2f5;
    --text: #1c1e21;
    --box: #ffffff;
}

@media (prefers-color-scheme: dark) {
    :root {
        --bg: #18191a;
        --text: #e4e6eb;
        --box: #242526;
    }
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

/* CONTENEDOR */
.container {
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    max-width: 1100px;
    padding: 20px;
}

/* TEXTO */
.logo-section {
    flex: 1;
}

.logo-section h1 {
    font-size: clamp(2.5rem, 5vw, 4rem);
    color: #1877f2;
}

.logo-section p {
    font-size: clamp(1rem, 2vw, 1.4rem);
}

/* LOGIN */
.login-box {
    flex: 1;
    max-width: 400px;
    background: var(--box);
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    animation: fadeIn 0.6s ease;
}

/* INPUT */
.input-group {
    position: relative;
}

input {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 16px;
    transition: 0.3s;
}

input:focus {
    border-color: #1877f2;
    box-shadow: 0 0 0 2px rgba(24,119,242,0.2);
    outline: none;
}

/* ERROR */
.error {
    color: red;
    font-size: 13px;
    display: none;
}

/* BOTÓN */
button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    font-size: 18px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:disabled {
    background: #ccc;
    cursor: not-allowed;
}

.login-btn {
    background: #1877f2;
    color: white;
}

.login-btn:hover:not(:disabled) {
    background: #166fe5;
}

.create-account {
    background: #42b72a;
    color: white;
}

.create-account:hover {
    background: #36a420;
}

/* LINKS */
a {
    display: block;
    text-align: center;
    margin: 12px 0;
    color: #1877f2;
    text-decoration: none;
}

/* DIVIDER */
.divider {
    margin: 15px 0;
    border-top: 1px solid #ddd;
}

/* LOADING */
.loading {
    opacity: 0.7;
}

/* ANIMACIÓN */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
        text-align: center;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="logo-section">
        <h1>facebook</h1>
        <p>Conecta con amigos y el mundo que te rodea.</p>
    </div>

    <div class="login-box">
        
        <div class="input-group">
            <input id="email" type="email" placeholder="Correo electrónico">
            <div class="error" id="emailError">Correo inválido</div>
        </div>

        <div class="input-group">
            <input id="password" type="password" placeholder="Contraseña">
            <div class="error" id="passError">Mínimo 6 caracteres</div>
        </div>

        <button id="loginBtn" class="login-btn" disabled>Iniciar sesión</button>

        <a href="#">¿Olvidaste tu contraseña?</a>

        <div class="divider"></div>

        <button class="create-account">Crear cuenta nueva</button>

    </div>

</div>

<script>
const email = document.getElementById("email");
const password = document.getElementById("password");
const btn = document.getElementById("loginBtn");

const emailError = document.getElementById("emailError");
const passError = document.getElementById("passError");

function validate() {
    let valid = true;

    if (!email.value.includes("@")) {
        emailError.style.display = "block";
        valid = false;
    } else {
        emailError.style.display = "none";
    }

    if (password.value.length < 6) {
        passError.style.display = "block";
        valid = false;
    } else {
        passError.style.display = "none";
    }

    btn.disabled = !valid;
}

email.addEventListener("input", validate);
password.addEventListener("input", validate);

/* SIMULACIÓN LOGIN */
btn.addEventListener("click", () => {
    btn.textContent = "Cargando...";
    btn.classList.add("loading");

    setTimeout(() => {
        btn.textContent = "Iniciar sesión";
        alert("Inicio de sesión simulado");
    }, 1500);
});
</script>

</body>
</html>
